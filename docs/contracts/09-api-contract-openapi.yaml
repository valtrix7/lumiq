openapi: 3.1.1
info:
  title: Lumiq Core API
  version: 0.1.0
  summary: HTTP/RPC API contract for Lumiq — Live Commerce Moment Vault.
  description: |
    Machine-readable OpenAPI contract for Lumiq's Core API.

    This contract is optimized for both human engineers and AI coding agents.
    It defines the authenticated product API, internal agent tool gateway,
    and internal worker callback API.

    Architecture rules:
      - Clerk authenticates human users.
      - Core API owns authorization, policy, state transitions, budgets, and audit.
      - Agents use only typed internal tool gateways.
      - Workers report results through internal worker endpoints.
      - B2 object writes are represented through asset records and signed URLs.
      - Generated media is tracked through generation_runs and provenance.
      - Product facts must be grounded in catalog snapshots before publish.

    Related documents:
      - 00-spec-index.md
      - 01-product-requirements.md
      - 02-project-constitution.md
      - 03-glossary-domain-language.md
      - 04-requirements-ears.md
      - 05-user-flows-ux-spec.md
      - 06-system-architecture-c4.md
      - 07-service-decomposition.md
      - 08-data-model-database-schema.md
  contact:
    name: Lumiq Engineering
  license:
    name: Proprietary
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: https://api.lumiq.app
    description: Production API
  - url: https://staging-api.lumiq.app
    description: Staging API
  - url: http://localhost:3000
    description: Local development API
security:
  - ClerkBearerAuth: []
tags:
  - name: Health
  - name: Identity
  - name: Organizations
  - name: Catalog
  - name: Campaigns
  - name: Sessions
  - name: Moments
  - name: Assets
  - name: Generation
  - name: Review
  - name: Publishing
  - name: Share
  - name: Admin
  - name: AgentTools
  - name: WorkerCallbacks
x-lumiq-contract:
  document_id: 09-api-contract-openapi.yaml
  contract_status: draft
  source_documents:
    - 01-product-requirements.md
    - 02-project-constitution.md
    - 03-glossary-domain-language.md
    - 04-requirements-ears.md
    - 07-service-decomposition.md
    - 08-data-model-database-schema.md
  implementation_rules:
    - Core API owns business state transitions.
    - Every command must be authenticated and organization-scoped unless explicitly public.
    - Every mutating command must accept or derive an idempotency key.
    - Every sensitive command must write an audit event.
    - Agent endpoints are internal only and require service identity auth.
    - Worker callback endpoints are internal only and require service identity auth.
    - Do not expose raw provider or B2 credentials to browsers or agents.
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Health check.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/me:
    get:
      tags: [Identity]
      operationId: getCurrentUser
      summary: Return current user and organizations.
      responses:
        "200":
          description: Current user context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"

  /api/organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations available to the current user.
      responses:
        "200":
          description: Organizations.
          content:
            application/json:
              schema:
                type: object
                required: [organizations]
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"

    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create a new organization.
      x-lumiq:
        requirement_ids: [REQ-AUTH-002]
        capability: organization:create
        audit: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/organizations/{organization_id}/setup-status:
    get:
      tags: [Organizations]
      operationId: getOrganizationSetupStatus
      summary: Return setup checklist for setup-first onboarding.
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /api/catalog/products:
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products for an organization.
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
        - name: query
          in: query
          schema: { type: string }
        - name: campaign_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Products.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Product" }
                  page: { $ref: "#/components/schemas/PageMeta" }

    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create a product in the organization catalog.
      x-lumiq:
        requirement_ids: [REQ-CATALOG-001]
        capability: catalog:write
        audit: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /api/catalog/products/{product_id}:
    get:
      tags: [Catalog]
      operationId: getProduct
      summary: Get product details.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

    patch:
      tags: [Catalog]
      operationId: updateProduct
      summary: Update product fields.
      x-lumiq:
        capability: catalog:write
        audit: true
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProductRequest" }
      responses:
        "200":
          description: Updated product.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /api/catalog/import-csv:
    post:
      tags: [Catalog]
      operationId: importCatalogCsv
      summary: Import products from CSV.
      x-lumiq:
        requirement_ids: [REQ-CATALOG-002]
        capability: catalog:write
        audit: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [organization_id, file]
              properties:
                organization_id: { $ref: "#/components/schemas/ULID" }
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Import accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportJob" }

  /api/catalog/snapshots:
    post:
      tags: [Catalog]
      operationId: createCatalogSnapshot
      summary: Create a catalog snapshot for a session/campaign.
      x-lumiq:
        requirement_ids: [REQ-CATALOG-003, REQ-CATALOG-004]
        capability: catalog:snapshot
        audit: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCatalogSnapshotRequest" }
      responses:
        "201":
          description: Created snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogSnapshot" }

  /api/campaigns:
    get:
      tags: [Campaigns]
      operationId: listCampaigns
      summary: List campaigns.
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
      responses:
        "200":
          description: Campaigns.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Campaign" }

    post:
      tags: [Campaigns]
      operationId: createCampaign
      summary: Create a campaign/offer context.
      x-lumiq:
        capability: campaign:write
        audit: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCampaignRequest" }
      responses:
        "201":
          description: Created campaign.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }

  /api/sessions:
    get:
      tags: [Sessions]
      operationId: listSessions
      summary: List sessions.
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/SessionStatus" }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Sessions.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
                  page: { $ref: "#/components/schemas/PageMeta" }

    post:
      tags: [Sessions]
      operationId: createSession
      summary: Create a session in created state.
      x-lumiq:
        requirement_ids: [REQ-SESSION-001]
        capability: session:create
        audit: true
        emits: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /api/sessions/{session_id}:
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Get session details.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /api/sessions/{session_id}/preflight:
    post:
      tags: [Sessions]
      operationId: validateSessionPreflight
      summary: Validate source, catalog, campaign, recording policy, and budget before Live Studio.
      x-lumiq:
        requirement_ids: [REQ-SESSION-002, REQ-CATALOG-003]
        capability: session:create
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionPreflightRequest" }
      responses:
        "200":
          description: Preflight result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionPreflightResult" }

  /api/sessions/{session_id}/start:
    post:
      tags: [Sessions]
      operationId: startSession
      summary: Start a session and emit session.opened.
      x-lumiq:
        requirement_ids: [REQ-SESSION-004]
        capability: session:create
        audit: true
        emits: [session.opened]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartSessionRequest" }
      responses:
        "200":
          description: Session started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /api/sessions/{session_id}/end:
    post:
      tags: [Sessions]
      operationId: endSession
      summary: End a session.
      x-lumiq:
        requirement_ids: [REQ-SESSION-005]
        capability: session:end
        audit: true
        emits: [session.closed]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Session ending/closed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /api/sessions/{session_id}/timeline:
    get:
      tags: [Sessions]
      operationId: getSessionTimeline
      summary: Get session timeline with signals, candidates, moments, and transcript snippets.
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Timeline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionTimeline" }

  /api/moments:
    get:
      tags: [Moments]
      operationId: listMoments
      summary: List moments with structured filters.
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
        - name: session_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - name: product_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - name: campaign_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - name: state
          in: query
          schema: { $ref: "#/components/schemas/MomentState" }
        - name: query
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Moments.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Moment" }
                  page: { $ref: "#/components/schemas/PageMeta" }

  /api/moments/{moment_id}:
    get:
      tags: [Moments]
      operationId: getMoment
      summary: Get moment detail.
      parameters:
        - $ref: "#/components/parameters/MomentId"
      responses:
        "200":
          description: Moment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MomentDetail" }

  /api/moments/{moment_id}/approve:
    post:
      tags: [Review]
      operationId: approveMoment
      summary: Approve a moment/version for canonical or publish readiness.
      x-lumiq:
        requirement_ids: [REQ-REVIEW-005]
        capability: moment:approve
        audit: true
        emits: [review.approved]
      parameters:
        - $ref: "#/components/parameters/MomentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApproveMomentRequest" }
      responses:
        "200":
          description: Moment approved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Moment" }

  /api/moments/{moment_id}/reject:
    post:
      tags: [Review]
      operationId: rejectMoment
      summary: Reject a moment or version.
      x-lumiq:
        capability: moment:reject
        audit: true
        emits: [review.rejected]
      parameters:
        - $ref: "#/components/parameters/MomentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RejectMomentRequest" }
      responses:
        "200":
          description: Moment rejected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Moment" }

  /api/moments/{moment_id}/rerender:
    post:
      tags: [Generation]
      operationId: rerenderMoment
      summary: Request a new immutable generated version for a moment.
      x-lumiq:
        requirement_ids: [REQ-GEN-005, REQ-REVIEW-004]
        capability: generation:rerun
        audit: true
        emits: [generation.requested]
      parameters:
        - $ref: "#/components/parameters/MomentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RerenderMomentRequest" }
      responses:
        "202":
          description: Rerender accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenerationRun" }

  /api/moments/{moment_id}/promote-canonical:
    post:
      tags: [Review]
      operationId: promoteCanonicalMomentVersion
      summary: Promote a generated version as canonical.
      x-lumiq:
        capability: moment:approve
        audit: true
      parameters:
        - $ref: "#/components/parameters/MomentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id]
              properties:
                asset_id: { $ref: "#/components/schemas/ULID" }
                reason: { type: string }
      responses:
        "200":
          description: Canonical version promoted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Moment" }

  /api/moments/{moment_id}/compare:
    get:
      tags: [Moments]
      operationId: getMomentCompare
      summary: Get raw/enhanced/published comparison data and signed URLs.
      parameters:
        - $ref: "#/components/parameters/MomentId"
      responses:
        "200":
          description: Compare data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MomentCompare" }

  /api/moments/{moment_id}/provenance:
    get:
      tags: [Moments]
      operationId: getMomentProvenance
      summary: Get lineage graph for a moment.
      parameters:
        - $ref: "#/components/parameters/MomentId"
      responses:
        "200":
          description: Provenance graph.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProvenanceGraph" }

  /api/assets/{asset_id}:
    get:
      tags: [Assets]
      operationId: getAsset
      summary: Get asset metadata.
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Asset metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }

  /api/assets/{asset_id}/signed-url:
    post:
      tags: [Assets]
      operationId: createAssetSignedUrl
      summary: Create a short-lived signed URL for an asset.
      x-lumiq:
        capability: asset:view
        audit: true
      parameters:
        - $ref: "#/components/parameters/AssetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                purpose:
                  type: string
                  enum: [preview, download, internal_worker]
                expires_in_seconds:
                  type: integer
                  minimum: 60
                  maximum: 3600
                  default: 900
      responses:
        "200":
          description: Signed URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignedUrlResponse" }

  /api/assets/{asset_id}/delete:
    post:
      tags: [Assets]
      operationId: deleteAsset
      summary: Soft delete an asset and schedule physical deletion where policy allows.
      x-lumiq:
        capability: asset:delete
        audit: true
      parameters:
        - $ref: "#/components/parameters/AssetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteAssetRequest" }
      responses:
        "202":
          description: Delete accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeletionResult" }

  /api/review-queue:
    get:
      tags: [Review]
      operationId: getReviewQueue
      summary: Get review queue with publish-readiness cards.
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
        - name: view
          in: query
          schema:
            type: string
            enum: [global, by_session, by_campaign, publish_ready, needs_review, failed]
        - name: session_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - name: campaign_id
          in: query
          schema: { $ref: "#/components/schemas/ULID" }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Review queue.
          content:
            application/json:
              schema:
                type: object
                required: [items, page]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ReviewQueueItem" }
                  page: { $ref: "#/components/schemas/PageMeta" }

  /api/publish-packages:
    post:
      tags: [Publishing]
      operationId: createPublishPackage
      summary: Create a publish package from a canonical enhanced asset.
      x-lumiq:
        requirement_ids: [REQ-PUBLISH-001]
        capability: publish:create
        audit: true
        emits: [publish.requested]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePublishPackageRequest" }
      responses:
        "202":
          description: Publish package creation accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublishPackage" }

  /api/publish-packages/{publish_package_id}:
    get:
      tags: [Publishing]
      operationId: getPublishPackage
      summary: Get publish package.
      parameters:
        - $ref: "#/components/parameters/PublishPackageId"
      responses:
        "200":
          description: Publish package.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublishPackage" }

  /api/publish-packages/{publish_package_id}/approve:
    post:
      tags: [Publishing]
      operationId: approvePublishPackage
      summary: Approve a publish package for external/share use.
      x-lumiq:
        requirement_ids: [REQ-PUBLISH-002]
        capability: publish:approve
        audit: true
      parameters:
        - $ref: "#/components/parameters/PublishPackageId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve]
                reason: { type: string }
      responses:
        "200":
          description: Approved package.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublishPackage" }

  /api/publish-packages/{publish_package_id}/create-share-page:
    post:
      tags: [Share]
      operationId: createSharePage
      summary: Create a share page for a publish package.
      x-lumiq:
        requirement_ids: [REQ-PUBLISH-004]
        capability: publish:create
        audit: true
      parameters:
        - $ref: "#/components/parameters/PublishPackageId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSharePageRequest" }
      responses:
        "201":
          description: Share page created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SharePage" }

  /api/share/{share_slug}:
    get:
      tags: [Share]
      operationId: getSharePage
      summary: Get public/private share page data.
      security: []
      parameters:
        - name: share_slug
          in: path
          required: true
          schema: { type: string, minLength: 6, maxLength: 64 }
      responses:
        "200":
          description: Share page data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicSharePageResponse" }
        "403":
          description: Private or unauthorized share page.

  /api/admin/dlq:
    get:
      tags: [Admin]
      operationId: listDeadLetterEvents
      summary: List dead-letter events.
      x-lumiq:
        capability: admin:recover
      parameters:
        - $ref: "#/components/parameters/OrganizationQuery"
        - name: event_type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [open, retried, terminal, skipped] }
      responses:
        "200":
          description: Dead-letter events.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DeadLetterEvent" }

  /api/admin/dlq/{dead_letter_event_id}/retry:
    post:
      tags: [Admin]
      operationId: retryDeadLetterEvent
      summary: Retry a dead-letter event.
      x-lumiq:
        capability: admin:recover
        audit: true
      parameters:
        - name: dead_letter_event_id
          in: path
          required: true
          schema: { $ref: "#/components/schemas/ULID" }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 3 }
      responses:
