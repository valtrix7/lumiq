components:
  securitySchemes:
    ClerkBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk-issued user session JWT.
    ServiceBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal service identity token for workers and Mastra Agent Service.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 256
      description: Stable idempotency key for mutating commands. Required by implementation even when technically optional in draft.
    OrganizationId:
      name: organization_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    OrganizationQuery:
      name: organization_id
      in: query
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    MomentId:
      name: moment_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    AssetId:
      name: asset_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    PublishPackageId:
      name: publish_package_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/ULID" }
    PageCursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
    PageLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  responses:
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Authenticated but missing capability or organization scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: State conflict or idempotency conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ValidationError:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ULID:
      type: string
      pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
      examples: [01HY7Y9Q6JVK2QF0S4W3X4T5P9]

    ISODateTime:
      type: string
      format: date-time

    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string, const: lumiq-core-api }
        version: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            trace_id: { type: string }
            details: { type: object, additionalProperties: true }

    PageMeta:
      type: object
      required: [has_more]
      properties:
        next_cursor: { type: [string, "null"] }
        has_more: { type: boolean }

    CurrentUserResponse:
      type: object
      required: [user, organizations]
      properties:
        user: { $ref: "#/components/schemas/User" }
        organizations:
          type: array
          items: { $ref: "#/components/schemas/OrganizationMembership" }

    User:
      type: object
      required: [user_id, clerk_user_id, email, created_at]
      properties:
        user_id: { $ref: "#/components/schemas/ULID" }
        clerk_user_id: { type: string }
        email: { type: string, format: email }
        display_name: { type: [string, "null"] }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    Organization:
      type: object
      required: [organization_id, name, created_at]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        name: { type: string }
        slug: { type: string }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    OrganizationMembership:
      type: object
      required: [organization, role, capabilities]
      properties:
        organization: { $ref: "#/components/schemas/Organization" }
        role: { type: string, enum: [owner, admin, editor, reviewer, viewer] }
        capabilities:
          type: array
          items: { type: string }

    CreateOrganizationRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2 }
        slug: { type: string }

    SetupStatus:
      type: object
      required: [organization_id, complete, checklist]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        complete: { type: boolean }
        checklist:
          type: array
          items:
            type: object
            required: [key, status, required]
            properties:
              key:
                type: string
                enum: [brand, products, campaign, catalog_snapshot, budget_policy, provider_ready]
              status: { type: string, enum: [missing, complete, warning] }
              required: { type: boolean }
              message: { type: string }

    Product:
      type: object
      required: [product_id, organization_id, name, sku, created_at]
      properties:
        product_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        name: { type: string }
        sku: { type: string }
        description: { type: [string, "null"] }
        price:
          type: [number, "null"]
          minimum: 0
        currency: { type: [string, "null"], minLength: 3, maxLength: 3 }
        product_url: { type: [string, "null"], format: uri }
        status: { type: string, enum: [active, archived], default: active }
        allowed_claims:
          type: array
          items: { $ref: "#/components/schemas/AllowedClaim" }
        media_assets:
          type: array
          items: { $ref: "#/components/schemas/ProductMediaAsset" }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    CreateProductRequest:
      type: object
      required: [organization_id, name, sku]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        name: { type: string }
        sku: { type: string }
        description: { type: string }
        price: { type: number, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3, default: USD }
        product_url: { type: string, format: uri }
        allowed_claims:
          type: array
          items: { $ref: "#/components/schemas/CreateAllowedClaim" }

    UpdateProductRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        product_url: { type: string, format: uri }
        status: { type: string, enum: [active, archived] }

    AllowedClaim:
      type: object
      required: [claim_id, claim_text, claim_type, status]
      properties:
        claim_id: { $ref: "#/components/schemas/ULID" }
        claim_text: { type: string }
        claim_type:
          type: string
          enum: [discount, inventory, feature, shipping, social_proof, guarantee, other]
        status: { type: string, enum: [approved, expired, revoked] }
        valid_from: { $ref: "#/components/schemas/ISODateTime" }
        valid_until: { type: [string, "null"], format: date-time }

    CreateAllowedClaim:
      type: object
      required: [claim_text, claim_type]
      properties:
        claim_text: { type: string }
        claim_type:
          type: string
          enum: [discount, inventory, feature, shipping, social_proof, guarantee, other]
        valid_until: { type: string, format: date-time }

    ProductMediaAsset:
      type: object
      required: [url, role]
      properties:
        url: { type: string, format: uri }
        role: { type: string, enum: [primary, gallery, reference, packaging] }

    Campaign:
      type: object
      required: [campaign_id, organization_id, name, status]
      properties:
        campaign_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        name: { type: string }
        status: { type: string, enum: [draft, active, ended, archived] }
        offer_summary: { type: [string, "null"] }
        product_ids:
          type: array
          items: { $ref: "#/components/schemas/ULID" }

    CreateCampaignRequest:
      type: object
      required: [organization_id, name]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        name: { type: string }
        offer_summary: { type: string }
        product_ids:
          type: array
          items: { $ref: "#/components/schemas/ULID" }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }

    CreateCatalogSnapshotRequest:
      type: object
      required: [organization_id, campaign_id]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        campaign_id: { $ref: "#/components/schemas/ULID" }
        session_id: { $ref: "#/components/schemas/ULID" }

    CatalogSnapshot:
      type: object
      required: [catalog_snapshot_id, organization_id, product_count, claim_count, manifest_asset_id, created_at]
      properties:
        catalog_snapshot_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        campaign_id: { $ref: "#/components/schemas/ULID" }
        product_count: { type: integer }
        offer_count: { type: integer }
        claim_count: { type: integer }
        manifest_asset_id: { $ref: "#/components/schemas/ULID" }
        b2_object_key: { type: string }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    ImportJob:
      type: object
      required: [import_job_id, status]
      properties:
        import_job_id: { $ref: "#/components/schemas/ULID" }
        status: { type: string, enum: [queued, running, completed, failed] }

    SourceType:
      type: string
      enum: [browser_camera, screen_share, upload_prerecorded, prerecorded_live, obs_rtmp, external_adapter]

    SessionStatus:
      type: string
      enum: [created, opening, live, closing, closed, error, reconciled]

    Session:
      type: object
      required: [session_id, organization_id, source_type, status, created_at]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        host_user_id: { type: [string, "null"] }
        title: { type: [string, "null"] }
        source_type: { $ref: "#/components/schemas/SourceType" }
        status: { $ref: "#/components/schemas/SessionStatus" }
        catalog_snapshot_id: { type: [string, "null"] }
        campaign_id: { type: [string, "null"] }
        full_session_recording_enabled: { type: boolean }
        live_transform_enabled: { type: boolean }
        live_transform_audience_visible: { type: boolean }
        started_at: { type: [string, "null"], format: date-time }
        ended_at: { type: [string, "null"], format: date-time }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    CreateSessionRequest:
      type: object
      required: [organization_id, source_type]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        title: { type: string }
        source_type: { $ref: "#/components/schemas/SourceType" }
        campaign_id: { $ref: "#/components/schemas/ULID" }
        mode: { type: string, enum: [commerce_grounded, demo_generic], default: commerce_grounded }

    SessionPreflightRequest:
      type: object
      required: [organization_id, source_type, recording_policy, automation_policy]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        source_type: { $ref: "#/components/schemas/SourceType" }
        campaign_id: { $ref: "#/components/schemas/ULID" }
        catalog_snapshot_id: { $ref: "#/components/schemas/ULID" }
        recording_policy:
          type: object
          required: [mode]
          properties:
            mode: { type: string, enum: [moment_only, full_session] }
            capture_live_transformed_when_relevant: { type: boolean, default: true }
        automation_policy:
          type: object
          properties:
            high_confidence_auto_capture: { type: boolean, default: true }
            high_confidence_auto_enhance: { type: boolean, default: true }
            medium_confidence_capture_review: { type: boolean, default: true }

    SessionPreflightResult:
      type: object
      required: [allowed, checks]
      properties:
        allowed: { type: boolean }
        checks:
          type: array
          items:
            type: object
            required: [key, status]
            properties:
              key: { type: string }
              status: { type: string, enum: [pass, fail, warning] }
              message: { type: string }
        catalog_snapshot_id: { type: [string, "null"] }

    StartSessionRequest:
      type: object
      properties:
        source_ref: { type: string }
        start_mode: { type: string, enum: [live, prerecorded_live], default: prerecorded_live }

    TimelineEventType:
      type: string
      enum: [signal, candidate, capture, generation, qa, review, publish]

    SessionTimeline:
      type: object
      required: [session_id, events]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        events:
          type: array
          items:
            type: object
            required: [type, start_ms]
            properties:
              type: { $ref: "#/components/schemas/TimelineEventType" }
              start_ms: { type: integer }
              end_ms: { type: [integer, "null"] }
              label: { type: string }
              ref_id: { type: string }
              status: { type: string }

    MomentState:
      type: string
      enum: [candidate, capture_authorized, capturing, raw_uploaded, enhancement_pending, enhancing, qa_pending, review_pending, approved, canonical, published, rejected, failed, archived, deleted]

    MomentType:
      type: string
      enum: [product_reveal, offer_mention, try_on, feature_demo, host_reaction, before_after, limited_stock_cta, unknown]

    Moment:
      type: object
      required: [moment_id, organization_id, session_id, state, start_ms, end_ms, moment_type, created_at]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        session_id: { $ref: "#/components/schemas/ULID" }
        state: { $ref: "#/components/schemas/MomentState" }
        start_ms: { type: integer }
        end_ms: { type: integer }
        raw_capture_start_ms: { type: [integer, "null"] }
        raw_capture_end_ms: { type: [integer, "null"] }
        moment_type: { $ref: "#/components/schemas/MomentType" }
        score: { type: [number, "null"], minimum: 0, maximum: 1 }
        selection_reason: { type: [string, "null"] }
        product_id: { type: [string, "null"] }
        campaign_id: { type: [string, "null"] }
        canonical_asset_id: { type: [string, "null"] }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    MomentDetail:
      allOf:
        - $ref: "#/components/schemas/Moment"
        - type: object
          properties:
            assets:
              type: array
              items: { $ref: "#/components/schemas/Asset" }
            generation_runs:
              type: array
              items: { $ref: "#/components/schemas/GenerationRun" }
            evidence:
              type: array
              items: { $ref: "#/components/schemas/MomentEvidence" }
            qa_checks:
              type: array
              items: { $ref: "#/components/schemas/QaCheck" }

    MomentEvidence:
      type: object
      required: [evidence_id, evidence_type, summary]
      properties:
        evidence_id: { $ref: "#/components/schemas/ULID" }
        evidence_type: { type: string, enum: [signal, transcript_excerpt, frame_ref, agent_output, policy_decision, budget_decision] }
        summary: { type: string }
        ref_id: { type: string }
        confidence: { type: [number, "null"], minimum: 0, maximum: 1 }

    AssetRole:
      type: string
      enum: [raw_source, raw_mezzanine, live_transformed, enhanced_master, publish_variant, thumbnail, captions, transcript, evidence, manifest, catalog_snapshot]

    AssetVerificationStatus:
      type: string
      enum: [unverified, verified, failed]

    Asset:
      type: object
      required: [asset_id, organization_id, asset_role, bucket, object_key, verification_status, created_at]
      properties:
        asset_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        session_id: { type: [string, "null"] }
        moment_id: { type: [string, "null"] }
        asset_role: { $ref: "#/components/schemas/AssetRole" }
        bucket: { type: string }
        object_key: { type: string }
        mime_type: { type: [string, "null"] }
        bytes: { type: [integer, "null"] }
        sha256: { type: [string, "null"] }
        width: { type: [integer, "null"] }
        height: { type: [integer, "null"] }
        duration_ms: { type: [integer, "null"] }
        verification_status: { $ref: "#/components/schemas/AssetVerificationStatus" }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    SignedUrlResponse:
      type: object
      required: [url, expires_at]
      properties:
        url: { type: string, format: uri }
        expires_at: { $ref: "#/components/schemas/ISODateTime" }

    DeleteAssetRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        delete_scope: { type: string, enum: [asset_only, moment_assets, publish_package], default: asset_only }

    DeletionResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [soft_deleted, scheduled, denied] }
        deletion_job_id: { type: [string, "null"] }

    GenerationRunStatus:
      type: string
      enum: [queued, running, provider_pending, completed, failed, cancelled, reconciled]

    GenerationRun:
      type: object
      required: [generation_run_id, organization_id, run_type, status, created_at]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        session_id: { type: [string, "null"] }
        moment_id: { type: [string, "null"] }
        parent_run_id: { type: [string, "null"] }
        run_type: { type: string, enum: [enhancement, restyle, thumbnail, captions, publish_variant, qa_auxiliary] }
        status: { $ref: "#/components/schemas/GenerationRunStatus" }
        provider: { type: [string, "null"] }
        model: { type: [string, "null"] }
        template_id: { type: [string, "null"] }
        template_version: { type: [string, "null"] }
        input_asset_id: { type: [string, "null"] }
        output_asset_id: { type: [string, "null"] }
        manifest_asset_id: { type: [string, "null"] }
        estimated_cost_usd: { type: [number, "null"] }
        actual_cost_usd: { type: [number, "null"] }
        error_code: { type: [string, "null"] }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    RerenderMomentRequest:
      type: object
      required: [template_id, reason]
      properties:
        template_id: { type: string }
        template_version: { type: string }
        reason: { type: string }
        edits:
          type: object
          properties:
            final_trim_start_ms: { type: integer }
            final_trim_end_ms: { type: integer }
            hook_title: { type: string }
            caption_text: { type: string }
            product_card_enabled: { type: boolean }
            ai_restyle_enabled: { type: boolean }

    QaStatus:
      type: string
      enum: [not_started, running, passed, failed, review_required, remediated, terminal]

    QaCheck:
      type: object
      required: [qa_check_id, status, check_name]
      properties:
        qa_check_id: { $ref: "#/components/schemas/ULID" }
        check_name: { type: string }
        status: { $ref: "#/components/schemas/QaStatus" }
        failure_class: { type: [string, "null"], enum: [retryable, remediable, review_required, terminal, null] }
        reason: { type: [string, "null"] }

    ReviewQueueItem:
      type: object
      required: [moment, status_summary]
      properties:
        moment: { $ref: "#/components/schemas/Moment" }
        status_summary:
          type: object
          properties:
            qa_status: { $ref: "#/components/schemas/QaStatus" }
            product_fact_status: { type: string, enum: [grounded, missing, review_required] }
            publish_ready: { type: boolean }
            explanation: { type: string }
        preview_asset: { $ref: "#/components/schemas/Asset" }

    ApproveMomentRequest:
      type: object
      required: [asset_id, decision]
      properties:
        asset_id: { $ref: "#/components/schemas/ULID" }
        decision: { type: string, enum: [approve] }
        promote_canonical: { type: boolean, default: true }
        reason: { type: string }

    RejectMomentRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        rejection_type: { type: string, enum: [bad_moment, bad_generation, wrong_product, unsafe, duplicate, other] }

    MomentCompare:
      type: object
      required: [moment_id]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        raw_asset: { $ref: "#/components/schemas/Asset" }
        enhanced_asset: { $ref: "#/components/schemas/Asset" }
        published_asset: { $ref: "#/components/schemas/Asset" }
        signed_urls:
          type: object
          additionalProperties:
            type: string
            format: uri

    ProvenanceGraph:
      type: object
      required: [moment_id, nodes, edges]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        nodes:
          type: array
          items:
            type: object
            required: [id, type, label]
            properties:
              id: { type: string }
              type: { type: string, enum: [asset, generation_run, publish_package, catalog_snapshot, manifest] }
              label: { type: string }
              status: { type: string }
              ref_id: { type: string }
        edges:
          type: array
          items:
            type: object
            required: [from, to, relationship]
            properties:
              from: { type: string }
              to: { type: string }
              relationship: { type: string, enum: [derived_from, generated_by, packaged_as, verified_by, grounded_in] }

    CreatePublishPackageRequest:
      type: object
      required: [organization_id, moment_id, canonical_asset_id]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        canonical_asset_id: { $ref: "#/components/schemas/ULID" }
        destinations:
          type: array
          items: { type: string, enum: [internal_library, download_zip, signed_share_link, shopify_media, youtube_shorts, tiktok_draft, instagram_reels] }
        title: { type: string }
        description: { type: string }

    PublishPackage:
      type: object
      required: [publish_package_id, organization_id, moment_id, status]
      properties:
        publish_package_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        status: { type: string, enum: [draft, ready, review_pending, approved, published, failed, revoked, deleted] }
        canonical_asset_id: { $ref: "#/components/schemas/ULID" }
        thumbnail_asset_id: { type: [string, "null"] }
        captions_asset_id: { type: [string, "null"] }
        provenance_manifest_asset_id: { type: [string, "null"] }
        title: { type: [string, "null"] }
        description: { type: [string, "null"] }
        product_links:
          type: array
          items: { type: string, format: uri }

    CreateSharePageRequest:
      type: object
      required: [visibility]
      properties:
        visibility: { type: string, enum: [private, unlisted_public] }
        expires_at: { type: [string, "null"], format: date-time }
        allow_download: { type: boolean, default: false }
        show_provenance_badge: { type: boolean, default: true }

    SharePage:
      type: object
      required: [share_page_id, publish_package_id, share_slug, visibility, status]
      properties:
        share_page_id: { $ref: "#/components/schemas/ULID" }
        publish_package_id: { $ref: "#/components/schemas/ULID" }
        share_slug: { type: string }
        visibility: { type: string, enum: [private, unlisted_public] }
        status: { type: string, enum: [active, revoked, expired] }
        url: { type: string, format: uri }

    PublicSharePageResponse:
      type: object
      required: [share_page, publish_package]
      properties:
        share_page: { $ref: "#/components/schemas/SharePage" }
        publish_package: { $ref: "#/components/schemas/PublishPackage" }
        signed_video_url: { type: [string, "null"], format: uri }
        product_links:
          type: array
          items: { type: string, format: uri }

    AgentToolEnvelope:
      type: object
      required: [tool_call_id, agent_id, organization_id, idempotency_key, trace_id, payload]
      properties:
        tool_call_id: { $ref: "#/components/schemas/ULID" }
        agent_id: { type: string }
        organization_id: { $ref: "#/components/schemas/ULID" }
        session_id: { type: [string, "null"] }
        moment_id: { type: [string, "null"] }
        requested_by_user_id: { type: [string, "null"] }
        idempotency_key: { type: string }
        trace_id: { type: string }
        payload: { type: object, additionalProperties: true }

    AgentProposeMomentCandidateRequest:
      allOf:
        - $ref: "#/components/schemas/AgentToolEnvelope"
        - type: object
          properties:
            payload:
              type: object
              required: [session_id, start_ms, end_ms, confidence, moment_type, reason, evidence_refs]
              properties:
                session_id: { $ref: "#/components/schemas/ULID" }
                start_ms: { type: integer }
                end_ms: { type: integer }
                confidence: { type: number, minimum: 0, maximum: 1 }
                moment_type: { $ref: "#/components/schemas/MomentType" }
                reason: { type: string }
                evidence_refs:
                  type: array
                  items: { type: string }

    AgentSuggestTemplateRequest:
      allOf:
        - $ref: "#/components/schemas/AgentToolEnvelope"
        - type: object
          properties:
            payload:
              type: object
              required: [moment_id, template_id, reason]
              properties:
                moment_id: { $ref: "#/components/schemas/ULID" }
                template_id: { type: string }
                template_version: { type: string }
                ai_restyle_enabled: { type: boolean }
                reason: { type: string }

    AgentValidateProductMatchRequest:
      allOf:
        - $ref: "#/components/schemas/AgentToolEnvelope"
        - type: object
          properties:
            payload:
              type: object
              required: [moment_id, matches]
              properties:
                moment_id: { $ref: "#/components/schemas/ULID" }
                matches:
                  type: array
                  items:
                    type: object
                    required: [product_id, confidence]
                    properties:
                      product_id: { $ref: "#/components/schemas/ULID" }
                      sku: { type: string }
                      confidence: { type: number, minimum: 0, maximum: 1 }
                      evidence_refs:
                        type: array
                        items: { type: string }
                needs_human_review: { type: boolean }

    AgentExplainQaResultRequest:
      allOf:
        - $ref: "#/components/schemas/AgentToolEnvelope"
        - type: object
          properties:
            payload:
              type: object
              required: [moment_id, qa_check_id, explanation]
              properties:
                moment_id: { $ref: "#/components/schemas/ULID" }
                qa_check_id: { $ref: "#/components/schemas/ULID" }
                explanation: { type: string }

    AgentToolResult:
      type: object
      required: [accepted, status]
      properties:
        accepted: { type: boolean }
        status: { type: string, enum: [recorded, denied, duplicate, invalid_state, budget_blocked] }
        resource_id: { type: [string, "null"] }
        message: { type: string }

    CaptureCompletedRequest:
      type: object
      required: [organization_id, session_id, moment_id, raw_asset, trace_id]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        session_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        raw_asset: { $ref: "#/components/schemas/AssetWriteDescriptor" }
        mezzanine_asset: { $ref: "#/components/schemas/AssetWriteDescriptor" }
        trace_id: { type: string }

    AssetWriteDescriptor:
      type: object
      required: [asset_role, bucket, object_key, bytes, sha256]
      properties:
        asset_role: { $ref: "#/components/schemas/AssetRole" }
        bucket: { type: string }
        object_key: { type: string }
        mime_type: { type: string }
        bytes: { type: integer }
        sha256: { type: string }
        width: { type: integer }
        height: { type: integer }
        duration_ms: { type: integer }

    GenerationStartedRequest:
      type: object
      required: [generation_run_id, organization_id, trace_id]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        provider: { type: string }
        model: { type: string }
        trace_id: { type: string }

    GenerationCompletedRequest:
      type: object
      required: [generation_run_id, organization_id, output_asset, manifest_asset, trace_id]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        output_asset: { $ref: "#/components/schemas/AssetWriteDescriptor" }
        manifest_asset: { $ref: "#/components/schemas/AssetWriteDescriptor" }
        provider: { type: string }
        model: { type: string }
        provider_job_ref: { type: string }
        actual_cost_usd: { type: number }
        trace_id: { type: string }

    GenerationFailedRequest:
      type: object
      required: [generation_run_id, organization_id, failure_class, error_code, message, trace_id]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        failure_class: { type: string, enum: [retryable, remediable, review_required, terminal] }
        error_code: { type: string }
        message: { type: string }
        trace_id: { type: string }

    QaCompletedRequest:
      type: object
      required: [organization_id, moment_id, status, checks, trace_id]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        status: { $ref: "#/components/schemas/QaStatus" }
        checks:
          type: array
          items: { $ref: "#/components/schemas/QaCheck" }
        trace_id: { type: string }

    PublishCompletedRequest:
      type: object
      required: [organization_id, publish_package_id, status, trace_id]
      properties:
        organization_id: { $ref: "#/components/schemas/ULID" }
        publish_package_id: { $ref: "#/components/schemas/ULID" }
        status: { type: string, enum: [ready, published, failed] }
        assets:
          type: array
          items: { $ref: "#/components/schemas/AssetWriteDescriptor" }
        trace_id: { type: string }

    WorkerCallbackResult:
      type: object
      required: [accepted, status]
      properties:
        accepted: { type: boolean }
        status: { type: string }
        message: { type: string }

    DeadLetterEvent:
      type: object
      required: [dead_letter_event_id, organization_id, event_type, status, created_at]
      properties:
        dead_letter_event_id: { $ref: "#/components/schemas/ULID" }
        organization_id: { $ref: "#/components/schemas/ULID" }
        event_type: { type: string }
        status: { type: string, enum: [open, retried, terminal, skipped] }
        error_message: { type: string }
        trace_id: { type: string }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    AdminActionResult:
      type: object
      required: [accepted, action_id]
      properties:
        accepted: { type: boolean }
        action_id: { $ref: "#/components/schemas/ULID" }
        message: { type: string }
