  receiveMomentCaptureAuthorized:
    action: receive
    channel:
      $ref: "#/channels/momentCaptureAuthorized"
    messages:
      - $ref: "#/channels/momentCaptureAuthorized/messages/MomentCaptureAuthorized"
  publishGenerationRequested:
    action: send
    channel:
      $ref: "#/channels/generationRequested"
    messages:
      - $ref: "#/channels/generationRequested/messages/GenerationRequested"
  receiveGenerationRequested:
    action: receive
    channel:
      $ref: "#/channels/generationRequested"
    messages:
      - $ref: "#/channels/generationRequested/messages/GenerationRequested"
  publishGenerationCompleted:
    action: send
    channel:
      $ref: "#/channels/generationCompleted"
    messages:
      - $ref: "#/channels/generationCompleted/messages/GenerationCompleted"
  receiveGenerationCompleted:
    action: receive
    channel:
      $ref: "#/channels/generationCompleted"
    messages:
      - $ref: "#/channels/generationCompleted/messages/GenerationCompleted"
  publishQaCompleted:
    action: send
    channel:
      $ref: "#/channels/qaCompleted"
    messages:
