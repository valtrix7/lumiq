asyncapi: 3.0.0
info:
  title: Lumiq Event Contract
  version: 0.1.0
  summary: AsyncAPI contract for Lumiq's NATS JetStream event backbone.
  description: |
    Machine-readable event contract for Lumiq — Live Commerce Moment Vault.

    This AsyncAPI document describes the NATS JetStream subjects, event envelopes,
    message payloads, producer/consumer ownership, retry/DLQ policy, and idempotency
    rules for Lumiq's event-driven backend.

    Architectural rules:
      - NATS transports events and jobs; Postgres remains operational truth.
      - All events use a standard envelope.
      - All events are organization-scoped.
      - All events are schema-versioned.
      - Consumers must be idempotent.
      - Retry exhaustion sends the event to a dead-letter stream.
      - High-cardinality tenant/session IDs stay in payload, not subject names.
defaultContentType: application/json
servers:
  dev:
    host: localhost:4222
    protocol: nats
    title: Local NATS
    description: Local development NATS JetStream server.
  staging:
    host: nats-staging.internal:4222
    protocol: nats
    title: Staging NATS
    description: Staging NATS JetStream server.
  production:
    host: nats-prod.internal:4222
    protocol: nats
    title: Production NATS
    description: Production NATS JetStream server.
channels:
  sessionOpened:
    address: session.opened
    messages:
      SessionOpened:
        $ref: "#/components/messages/SessionOpened"
    x-lumiq:
      stream: LUMIQ_SESSION
      retention: limits
      replay: true
  sessionClosed:
    address: session.closed
    messages:
      SessionClosed:
        $ref: "#/components/messages/SessionClosed"
    x-lumiq:
      stream: LUMIQ_SESSION
      replay: true
  signalDetected:
    address: signal.detected
    messages:
      SignalDetected:
        $ref: "#/components/messages/SignalDetected"
    x-lumiq:
      stream: LUMIQ_SIGNAL
      replay: true
  momentCandidateProposed:
    address: moment.candidate.proposed
    messages:
      MomentCandidateProposed:
        $ref: "#/components/messages/MomentCandidateProposed"
    x-lumiq:
      stream: LUMIQ_MOMENT
      replay: true
  momentCaptureAuthorized:
    address: moment.capture.authorized
    messages:
      MomentCaptureAuthorized:
        $ref: "#/components/messages/MomentCaptureAuthorized"
    x-lumiq:
      stream: LUMIQ_MOMENT
      durable_consumers:
        - capture-worker
  momentRawUploaded:
    address: moment.raw.uploaded
    messages:
      MomentRawUploaded:
        $ref: "#/components/messages/MomentRawUploaded"
    x-lumiq:
      stream: LUMIQ_MOMENT
      durable_consumers:
        - generation-dispatcher
        - search-indexing-worker
  generationRequested:
    address: generation.requested
    messages:
      GenerationRequested:
        $ref: "#/components/messages/GenerationRequested"
    x-lumiq:
      stream: LUMIQ_GENERATION
      durable_consumers:
        - genblaze-worker
  generationStarted:
    address: generation.started
    messages:
      GenerationStarted:
        $ref: "#/components/messages/GenerationStarted"
    x-lumiq:
      stream: LUMIQ_GENERATION
  generationCompleted:
    address: generation.completed
    messages:
      GenerationCompleted:
        $ref: "#/components/messages/GenerationCompleted"
    x-lumiq:
      stream: LUMIQ_GENERATION
      durable_consumers:
        - qa-worker
        - provenance-verifier
        - search-indexing-worker
  generationFailed:
    address: generation.failed
    messages:
      GenerationFailed:
        $ref: "#/components/messages/GenerationFailed"
    x-lumiq:
      stream: LUMIQ_GENERATION
      durable_consumers:
        - admin-recovery
  qaCompleted:
    address: qa.completed
    messages:
      QaCompleted:
        $ref: "#/components/messages/QaCompleted"
    x-lumiq:
      stream: LUMIQ_QA
      durable_consumers:
        - review-queue-updater
  reviewApproved:
    address: review.approved
    messages:
      ReviewApproved:
        $ref: "#/components/messages/ReviewApproved"
    x-lumiq:
      stream: LUMIQ_REVIEW
      durable_consumers:
        - publish-worker
  reviewRejected:
    address: review.rejected
    messages:
      ReviewRejected:
        $ref: "#/components/messages/ReviewRejected"
    x-lumiq:
      stream: LUMIQ_REVIEW
  publishRequested:
    address: publish.requested
    messages:
      PublishRequested:
        $ref: "#/components/messages/PublishRequested"
    x-lumiq:
      stream: LUMIQ_PUBLISH
      durable_consumers:
        - publish-worker
  publishCompleted:
    address: publish.completed
    messages:
      PublishCompleted:
        $ref: "#/components/messages/PublishCompleted"
    x-lumiq:
      stream: LUMIQ_PUBLISH
      durable_consumers:
        - search-indexing-worker
  assetDeleted:
    address: asset.deleted
    messages:
      AssetDeleted:
        $ref: "#/components/messages/AssetDeleted"
    x-lumiq:
      stream: LUMIQ_ASSET
      durable_consumers:
        - search-indexing-worker
        - retention-worker
  auditRecorded:
    address: audit.recorded
    messages:
      AuditRecorded:
        $ref: "#/components/messages/AuditRecorded"
    x-lumiq:
      stream: LUMIQ_AUDIT
  deadLetterCreated:
    address: dead_letter.event.created
    messages:
      DeadLetterCreated:
        $ref: "#/components/messages/DeadLetterCreated"
    x-lumiq:
      stream: LUMIQ_DLQ
