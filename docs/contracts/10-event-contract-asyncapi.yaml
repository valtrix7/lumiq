  receivePublishRequested:
    action: receive
    channel:
      $ref: "#/channels/publishRequested"
    messages:
      - $ref: "#/channels/publishRequested/messages/PublishRequested"
components:
  messages:
    SessionOpened:
      name: session.opened.v1
      title: Session opened
      summary: Emitted when a session transitions to live.
      headers:
        $ref: "#/components/schemas/EventHeaders"
      payload:
        allOf:
          - $ref: "#/components/schemas/EventEnvelope"
          - type: object
            properties:
              event_type:
                const: session.opened
              payload:
                $ref: "#/components/schemas/SessionOpenedPayload"
      x-lumiq:
        producer: core-api
        consumers: [signal-extraction-worker, live-studio-realtime]
        requirement_ids: [REQ-SESSION-004]

    SessionClosed:
      name: session.closed.v1
      title: Session closed
      headers:
        $ref: "#/components/schemas/EventHeaders"
      payload:
        allOf:
          - $ref: "#/components/schemas/EventEnvelope"
          - type: object
            properties:
              event_type:
                const: session.closed
              payload:
                $ref: "#/components/schemas/SessionClosedPayload"
      x-lumiq:
        producer: core-api
        consumers: [audit-worker, reconciliation-worker]
        requirement_ids: [REQ-SESSION-005]

    SignalDetected:
      name: signal.detected.v1
      title: Signal detected
      summary: Low-level signal emitted while a session is live.
      headers:
        $ref: "#/components/schemas/EventHeaders"
      payload:
