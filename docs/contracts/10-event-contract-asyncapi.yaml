        consumers: [audit-worker]

    DeadLetterCreated:
      name: dead_letter.event.created.v1
      title: Dead-letter event created
      headers:
        $ref: "#/components/schemas/EventHeaders"
      payload:
        allOf:
          - $ref: "#/components/schemas/EventEnvelope"
          - type: object
            properties:
              event_type:
                const: dead_letter.event.created
              payload:
                $ref: "#/components/schemas/DeadLetterCreatedPayload"
      x-lumiq:
        producer: event-runtime
        consumers: [admin-recovery]
        requirement_ids: [REQ-EVENT-005]

  schemas:
    EventHeaders:
      type: object
      required: [x-lumiq-event-id, x-lumiq-trace-id, x-lumiq-idempotency-key]
      properties:
        x-lumiq-event-id:
          type: string
        x-lumiq-trace-id:
          type: string
        x-lumiq-correlation-id:
          type: string
        x-lumiq-idempotency-key:
          type: string
        x-lumiq-schema-version:
          type: string

    ULID:
      type: string
      pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"

    EventEnvelope:
      type: object
      required:
        - event_id
        - event_type
        - schema_version
        - organization_id
        - occurred_at
        - producer
        - idempotency_key
        - correlation_id
        - trace_id
        - payload
      properties:
        event_id:
          $ref: "#/components/schemas/ULID"
        event_type:
          type: string
        schema_version:
          type: string
          examples: ["1.0.0"]
        organization_id:
          $ref: "#/components/schemas/ULID"
        occurred_at:
          type: string
          format: date-time
        producer:
          type: string
        idempotency_key:
          type: string
        correlation_id:
          type: string
        trace_id:
          type: string
        payload:
          type: object

    SessionOpenedPayload:
      type: object
      required: [session_id, source_type, started_at]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        source_type:
          type: string
          enum: [browser_camera, screen_share, upload_prerecorded, prerecorded_live, obs_rtmp, external_adapter]
        campaign_id: { $ref: "#/components/schemas/ULID" }
        catalog_snapshot_id: { $ref: "#/components/schemas/ULID" }
        started_at: { type: string, format: date-time }

    SessionClosedPayload:
      type: object
      required: [session_id, ended_at]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        ended_at: { type: string, format: date-time }
        reason: { type: string }

    SignalDetectedPayload:
      type: object
      required: [session_id, signal_id, signal_type, t_start_ms, score]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        signal_id: { $ref: "#/components/schemas/ULID" }
        signal_type:
          type: string
          enum: [product_visible, keyword_hit, offer_mention, audio_energy_peak, scene_change, manual_marker, chat_spike]
        t_start_ms: { type: integer }
        t_end_ms: { type: integer }
        score: { type: number, minimum: 0, maximum: 1 }
        evidence_ref: { type: string }
        summary: { type: string }

    MomentCandidateProposedPayload:
      type: object
      required: [session_id, candidate_id, start_ms, end_ms, moment_type, confidence, reason]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        candidate_id: { $ref: "#/components/schemas/ULID" }
        start_ms: { type: integer }
        end_ms: { type: integer }
        moment_type:
          type: string
          enum: [product_reveal, offer_mention, try_on, feature_demo, host_reaction, before_after, limited_stock_cta, unknown]
        confidence: { type: number, minimum: 0, maximum: 1 }
        reason: { type: string }
        evidence_refs:
          type: array
          items: { type: string }
        agent_tool_call_id: { $ref: "#/components/schemas/ULID" }

    MomentCaptureAuthorizedPayload:
      type: object
      required: [session_id, moment_id, raw_capture_start_ms, raw_capture_end_ms, authorization_id]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        raw_capture_start_ms: { type: integer }
        raw_capture_end_ms: { type: integer }
        authorization_id: { $ref: "#/components/schemas/ULID" }
        policy_result:
          type: object
          additionalProperties: true

    MomentRawUploadedPayload:
      type: object
      required: [session_id, moment_id, raw_asset_id]
      properties:
        session_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        raw_asset_id: { $ref: "#/components/schemas/ULID" }
        mezzanine_asset_id: { $ref: "#/components/schemas/ULID" }
        live_transformed_asset_id: { $ref: "#/components/schemas/ULID" }

    GenerationRequestedPayload:
      type: object
      required: [generation_run_id, moment_id, input_asset_id, template_id, template_version]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        session_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        input_asset_id: { $ref: "#/components/schemas/ULID" }
        template_id: { type: string }
        template_version: { type: string }
        provider_policy_id: { $ref: "#/components/schemas/ULID" }
        budget_authorization_id: { $ref: "#/components/schemas/ULID" }

    GenerationStartedPayload:
      type: object
      required: [generation_run_id]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        provider: { type: string }
        model: { type: string }

    GenerationCompletedPayload:
      type: object
      required: [generation_run_id, output_asset_id, manifest_asset_id]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        output_asset_id: { $ref: "#/components/schemas/ULID" }
        manifest_asset_id: { $ref: "#/components/schemas/ULID" }
        provider: { type: string }
        model: { type: string }
        provider_job_ref: { type: string }
        actual_cost_usd: { type: number }

    GenerationFailedPayload:
      type: object
      required: [generation_run_id, failure_class, error_code, message]
      properties:
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        failure_class:
          type: string
          enum: [retryable, remediable, review_required, terminal]
        error_code: { type: string }
        message: { type: string }
        fallback_attempted: { type: boolean }

    QaCompletedPayload:
      type: object
      required: [moment_id, status, checks]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        generation_run_id: { $ref: "#/components/schemas/ULID" }
        status:
          type: string
          enum: [passed, failed, review_required, terminal]
        checks:
          type: array
          items:
            type: object
            required: [check_name, status]
            properties:
              check_name: { type: string }
              status: { type: string, enum: [pass, fail, uncertain] }
              failure_class: { type: string, enum: [retryable, remediable, review_required, terminal] }
              reason: { type: string }

    ReviewApprovedPayload:
      type: object
      required: [moment_id, asset_id, approved_by_user_id]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        asset_id: { $ref: "#/components/schemas/ULID" }
        approved_by_user_id: { $ref: "#/components/schemas/ULID" }
        promote_canonical: { type: boolean }

    ReviewRejectedPayload:
      type: object
      required: [moment_id, rejected_by_user_id, reason]
      properties:
        moment_id: { $ref: "#/components/schemas/ULID" }
        rejected_by_user_id: { $ref: "#/components/schemas/ULID" }
        reason: { type: string }

    PublishRequestedPayload:
      type: object
      required: [publish_package_id, moment_id, canonical_asset_id]
      properties:
        publish_package_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        canonical_asset_id: { $ref: "#/components/schemas/ULID" }
        destinations:
          type: array
          items:
            type: string

    PublishCompletedPayload:
      type: object
      required: [publish_package_id, status]
      properties:
        publish_package_id: { $ref: "#/components/schemas/ULID" }
        status:
          type: string
          enum: [ready, published, failed]
        asset_ids:
          type: array
          items: { $ref: "#/components/schemas/ULID" }
        share_page_id: { $ref: "#/components/schemas/ULID" }

    AssetDeletedPayload:
      type: object
      required: [asset_id, delete_status]
      properties:
        asset_id: { $ref: "#/components/schemas/ULID" }
        moment_id: { $ref: "#/components/schemas/ULID" }
        delete_status:
          type: string
          enum: [soft_deleted, scheduled_physical_delete, physically_deleted]
        reason: { type: string }

    AuditRecordedPayload:
      type: object
      required: [audit_event_id, actor_type, actor_id, action]
      properties:
        audit_event_id: { $ref: "#/components/schemas/ULID" }
        actor_type:
          type: string
          enum: [user, service_agent, worker, system]
        actor_id: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }

    DeadLetterCreatedPayload:
      type: object
      required: [dead_letter_event_id, original_event_type, error_message]
      properties:
        dead_letter_event_id: { $ref: "#/components/schemas/ULID" }
        original_event_type: { type: string }
        original_event_id: { $ref: "#/components/schemas/ULID" }
        error_message: { type: string }
        retry_count: { type: integer }
        consumer: { type: string }

x-lumiq-runtime:
  nats:
    ack_policy: explicit
    max_deliver: 5
    backoff: [5s, 30s, 2m, 10m, 30m]
    dead_letter_subject: dead_letter.event.created
    idempotency: required
    consumer_rule: ack_only_after_durable_state
  streams:
    LUMIQ_SESSION:
      subjects: [session.*]
    LUMIQ_SIGNAL:
      subjects: [signal.*]
    LUMIQ_MOMENT:
      subjects: [moment.*]
    LUMIQ_GENERATION:
      subjects: [generation.*]
    LUMIQ_QA:
      subjects: [qa.*]
    LUMIQ_REVIEW:
      subjects: [review.*]
    LUMIQ_PUBLISH:
      subjects: [publish.*]
    LUMIQ_ASSET:
      subjects: [asset.*]
    LUMIQ_AUDIT:
      subjects: [audit.*]
    LUMIQ_DLQ:
      subjects: [dead_letter.*]
