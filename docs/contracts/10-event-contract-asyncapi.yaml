          - type: object
            properties:
              event_type:
                const: publish.completed
              payload:
                $ref: "#/components/schemas/PublishCompletedPayload"
      x-lumiq:
        producer: publish-worker
        consumers: [search-indexing-worker, live-studio-realtime]
        requirement_ids: [REQ-PUBLISH-004]

    AssetDeleted:
      name: asset.deleted.v1
      title: Asset deleted
      headers:
        $ref: "#/components/schemas/EventHeaders"
      payload:
        allOf:
          - $ref: "#/components/schemas/EventEnvelope"
          - type: object
            properties:
              event_type:
                const: asset.deleted
              payload:
                $ref: "#/components/schemas/AssetDeletedPayload"
      x-lumiq:
        producer: core-api
